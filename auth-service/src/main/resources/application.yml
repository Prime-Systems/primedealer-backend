# Auth Service Configuration
# Following 12-Factor App: Configuration via environment variables

spring:
  application:
    name: auth-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Redis Configuration (Session Storage)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true

  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-secret}
            scope: profile,email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:facebook-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:facebook-secret}
            scope: public_profile,email
          apple:
            client-id: ${APPLE_CLIENT_ID:apple-id}
            client-secret: ${APPLE_CLIENT_SECRET:apple-secret}
            scope: name,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub

# Server Configuration
server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  access-token:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-for-development-only-replace-in-production}
    validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY:900000}  # 15 minutes
  refresh-token:
    secret: ${JWT_REFRESH_SECRET:${JWT_SECRET:your-256-bit-secret-key-here-for-development-only-replace-in-production}}
    validity-ms: ${JWT_REFRESH_TOKEN_VALIDITY:604800000}  # 7 days
  issuer: ${JWT_ISSUER:prime-auth-service}

# User Service Configuration
user-service:
  url: ${USER_SERVICE_URL:http://localhost:8081}
  timeout-ms: ${USER_SERVICE_TIMEOUT:5000}

# Session Configuration
session:
  max-per-user: ${SESSION_MAX_PER_USER:5}
  duration-hours: ${SESSION_DURATION_HOURS:168}  # 7 days

# Actuator & Health
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
  show-actuator: false

# Logging
logging:
  level:
    root: INFO
    com.prime.auth: ${LOG_LEVEL:DEBUG}
    org.springframework.security: INFO
    org.springframework.data.redis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:/var/log/auth-service}/auth-service.log

---
# Local Development Profile
spring:
  config:
    activate:
      on-profile: local

  data:
    redis:
      host: localhost
      port: 6379

user-service:
  url: http://localhost:8081

logging:
  level:
    com.prime.auth: DEBUG

---
# Docker/Kubernetes Profile
spring:
  config:
    activate:
      on-profile: docker

  data:
    redis:
      host: redis
      port: 6379

user-service:
  url: http://user-service:8081

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.prime.auth: INFO
